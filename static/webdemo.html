<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能体 Web Demo</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #1e293b; }
        #chat-box { border: 1px solid #e2e8f0; border-radius: 8px; height: 320px; overflow-y: auto; padding: 12px; margin-bottom: 12px; background: #f8fafc; }
        .user-msg { text-align: right; color: #2563eb; margin: 4px 0; }
        .bot-msg { text-align: left; color: #16a34a; margin: 4px 0; }
        .input-row { display: flex; gap: 8px; }
        .input-row input { flex: 1; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
        .input-row button { padding: 10px 24px; background: #2563eb; color: #fff; border: 0; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
        .tip { font-size: 12px; color: #94a3b8; margin-top: 8px; }
    </style>
</head>
<body>
    <h1>🤖 AI 智能体演示</h1>
    <div id="chat-box">
        <div class="bot-msg">你好！我已接入平台认证。输入你的问题，我会通过后端安全处理。</div>
    </div>
    <div class="input-row">
        <input type="text" id="user-input" placeholder="输入你的问题...">
        <button id="send-btn">发送</button>
    </div>
    <div class="tip">🔒 你的请求携带了平台认证令牌，由后端安全转发。</div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function getToken() {
            return localStorage.getItem('zongce_token') || '';
        }

        function addMessage(text, sender) {
            const msg = document.createElement('div');
            msg.className = sender === 'user' ? 'user-msg' : 'bot-msg';
            msg.textContent = text;
            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const userInput = input.value.trim();
            if (!userInput) return;

            addMessage(userInput, 'user');
            input.value = '';
            input.disabled = true;
            sendBtn.disabled = true;

            try {
                const token = getToken();
                const response = await fetch('/webdemo/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ input: userInput })
                });

                const data = await response.json();
                if (response.ok) {
                    addMessage(data.answer || '没有收到回复。', 'bot');
                } else {
                    addMessage('❌ ' + (data.error || data.message || '请求失败'), 'bot');
                }
            } catch (error) {
                addMessage('❌ 网络错误: ' + error.message, 'bot');
            } finally {
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
